<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maroon Commerce - The Wild Nutrition Variant</title>
<style>
    body {
        margin: 0;
        padding: 0;
        background-color: #f9f7f1; /* Soft cream background */
        display: flex;
        flex-direction: column;
        align-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    img {
        max-width: 100%;
        height: auto;
        display: block;
        margin-bottom: -1px; /* Remove gaps between perfectly stacked images if any, though box shadow might be nice */
    }
    .image-wrapper {
        width: 100%;
        max-width: 1400px; /* Limit width on very large screens */
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        margin-bottom: 40px;
    }
    .header {
        text-align: center;
        padding: 60px 20px;
        color: #7A3E3E; /* Deep maroon */
    }
    h1 {
        margin: 0 0 15px 0;
        font-size: 36px;
        font-weight: 300;
    }
    p {
        margin: 0;
        color: #666;
        font-size: 18px;
    }
</style>
</head>
<body>
    <div class="header">
        <h1>Maroon Commerce</h1>
        <p>A unified presentation of the design direction</p>
    </div>
    
    <div class="image-wrapper">
        <img src="maroon_wellness_home_1781699871651.png" alt="Maroon Wellness Homepage">
    </div>
    <div class="image-wrapper">
        <img src="maroon_grid_layout_1781699892428.png" alt="Shop All Grid Layout">
    </div>
    <div class="image-wrapper">
        <img src="maroon_product_page_1781699881653.png" alt="Product Detail Page">
    </div>
    <div class="image-wrapper">
        <img src="maroon_lifestyle_ui_1781699904173.png" alt="Editorial Lifestyle UI">
    </div>
    <div class="image-wrapper">
        <img src="maroon_clinical_ui_1781699915447.png" alt="Clinical Trustworthy UI">
    </div>
</body>
</html>
